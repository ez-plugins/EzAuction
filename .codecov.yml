codecov:
  notify:
    after_n_builds: 1

coverage:
  status:
    project:
      default:
        target: auto      # pass if coverage does not drop vs base commit
        threshold: 1%     # allow 1% drop before failing
    patch:
      default:
        target: 50%       # new code in a PR should be at least 50% covered

ignore:
  - "src/test/**"
