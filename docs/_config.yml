remote_theme: just-the-docs/just-the-docs

title: EzAuction Docs
description: >-
  Operator-focused documentation for installing, configuring,
  and running EzAuction on Paper servers.

url: "https://ez-plugins.github.io"
baseurl: "/EzAuction"

color_scheme: ezauction
heading_anchors: true

aux_links:
  "GitHub":
    - "https://github.com/ez-plugins/EzAuction"
  "Releases":
    - "https://github.com/ez-plugins/EzAuction/releases"

aux_links_new_tab: true
nav_sort: case_insensitive

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/

back_to_top: true
back_to_top_text: "Back to top"

footer_content: >-
  EzAuction documentation. Distributed under the MIT License.

kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
